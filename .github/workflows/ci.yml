name: CI

# Push / PR runs the strict default: BOTH SDKs against the deterministic mock
# backend with the cross-SDK divergence gate ON.
#
# A manual run (Actions tab -> "Run workflow") exposes three knobs:
#   * languages        - run just one SDK, or both
#   * divergence_check - whether SDK disagreement fails the build (both-only)
#   * backend          - mock (default), emulator, or live
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      languages:
        description: "Which SDK runner(s) to execute"
        type: choice
        options: [both, python, java]
        default: both
      divergence_check:
        description: "Fail when SDKs disagree (only applies when languages=both)"
        type: boolean
        default: true
      backend:
        description: "Backend tier to exercise"
        type: choice
        options: [mock, emulator, live]
        default: mock

jobs:
  matrix:
    runs-on: ubuntu-latest
    env:
      # Event inputs are empty for push/pull_request, so fall back to the strict
      # defaults (both SDKs, divergence gate on, mock backend).
      LANGUAGES: ${{ github.event.inputs.languages || 'both' }}
      DIVERGENCE: ${{ github.event.inputs.divergence_check || 'true' }}
      BACKEND: ${{ github.event.inputs.backend || 'mock' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # run-matrix.py + the scenario loader need pyyaml; the mock backend
          # needs nothing else. The real SDK (azure-cosmos) is only required for
          # the emulator/live tiers.
          pip install pyyaml
          if [ "$BACKEND" != "mock" ]; then
            pip install -r harness/python/requirements.txt
          fi

      # Java toolchain + jar are only needed when the Java runner participates.
      - name: Set up Java
        if: ${{ env.LANGUAGES != 'python' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java runner
        if: ${{ env.LANGUAGES != 'python' }}
        run: cd harness/java && mvn -q -DskipTests package

      - name: Run scenario matrix
        env:
          # Only consumed when backend=live; harmless (empty) otherwise.
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          python scripts/run-matrix.py \
            --backend "$BACKEND" \
            --sdks "$LANGUAGES" \
            --out results/

      # Cross-SDK divergence gate: only meaningful when both SDKs ran. When a
      # single language is selected there is nothing to compare, so the gate is
      # skipped entirely (no false failure).
      - name: Compare SDKs (divergence gate)
        if: ${{ env.LANGUAGES == 'both' }}
        run: |
          FLAG=""
          if [ "$DIVERGENCE" = "true" ]; then FLAG="--fail-on-divergence"; fi
          python scripts/compare.py results/ -o report.md $FLAG

      - name: Single-SDK report
        if: ${{ env.LANGUAGES != 'both' }}
        run: python scripts/compare.py results/ -o report.md

      - name: Upload results + report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: matrix-${{ env.LANGUAGES }}-${{ env.BACKEND }}
          path: |
            results/
            report.md
          if-no-files-found: warn
