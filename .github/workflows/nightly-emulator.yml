name: Nightly (emulator)

# Runs the full matrix against the Linux Cosmos DB emulator on a schedule, plus
# on-demand. The emulator runs as a service container; because service
# containers start before the job regardless of inputs, the emulator tier lives
# in its own workflow rather than as a `backend` option on the fast mock gate.
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      languages:
        description: "Which SDK runner(s) to execute"
        type: choice
        options: [both, python, java]
        default: both
      divergence_check:
        description: "Fail when SDKs disagree (only applies when languages=both)"
        type: boolean
        default: true

jobs:
  emulator-matrix:
    runs-on: ubuntu-latest
    env:
      LANGUAGES: ${{ github.event.inputs.languages || 'both' }}
      DIVERGENCE: ${{ github.event.inputs.divergence_check || 'true' }}
    services:
      cosmos:
        # vNext Linux emulator: multi-arch, gateway-mode only. HTTP by default, so
        # force HTTPS via the PROTOCOL env var to match the SDKs' requirements.
        image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest
        ports:
          - 8081:8081     # gateway (HTTPS)
          - 8080:8080     # health probe (/ready) — HTTP
        env:
          PROTOCOL: https
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install -r harness/python/requirements.txt

      - name: Set up Java
        if: ${{ env.LANGUAGES != 'python' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java runner
        if: ${{ env.LANGUAGES != 'python' }}
        run: cd harness/java && mvn -q -DskipTests package

      # vNext exposes a health probe on :8080. Poll it for readiness, then export
      # the emulator's self-signed cert (via openssl, since vNext has no
      # /_explorer/emulator.pem endpoint) and trust it for the Java SDK. The Python
      # SDK skips verification for the emulator automatically.
      - name: Wait for emulator + trust certificate
        run: |
          set -e
          echo "Waiting for emulator readiness probe..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/ready >/dev/null 2>&1; then
              echo "Emulator is ready."
              break
            fi
            sleep 3
          done
          curl -sf http://localhost:8080/ready >/dev/null 2>&1 || { echo "Emulator never became ready"; exit 1; }
          # Export the gateway's TLS cert and trust it for the JVM + OS store.
          openssl s_client -connect localhost:8081 -servername localhost </dev/null 2>/dev/null \
            | openssl x509 -outform PEM > /tmp/cosmos.crt
          test -s /tmp/cosmos.crt || { echo "Could not extract emulator cert"; exit 1; }
          sudo cp /tmp/cosmos.crt /usr/local/share/ca-certificates/cosmos.crt
          sudo update-ca-certificates
          KEYTOOL="$JAVA_HOME/bin/keytool"
          sudo "$KEYTOOL" -importcert -noprompt -trustcacerts -alias cosmos-emulator \
            -file /tmp/cosmos.crt -keystore "$JAVA_HOME/lib/security/cacerts" \
            -storepass changeit || true

      - name: Run scenario matrix (emulator)
        env:
          # Well-known public emulator endpoint + key (also in config/default.yaml).
          REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        run: |
          python scripts/run-matrix.py \
            --backend emulator \
            --sdks "$LANGUAGES" \
            --out results/

      - name: Compare SDKs (divergence gate)
        if: ${{ env.LANGUAGES == 'both' }}
        run: |
          FLAG=""
          if [ "$DIVERGENCE" = "true" ]; then FLAG="--fail-on-divergence"; fi
          python scripts/compare.py results/ -o report.md $FLAG

      - name: Single-SDK report
        if: ${{ env.LANGUAGES != 'both' }}
        run: python scripts/compare.py results/ -o report.md

      - name: Upload results + report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: emulator-matrix-${{ env.LANGUAGES }}
          path: |
            results/
            report.md
          if-no-files-found: warn
