# Default configuration for the CosmosDB cross-SDK test runner (MVP).
#
# The MVP defaults to the in-memory `mock` backend so the matrix runs with no
# infrastructure. Switch to `emulator` or `live` to exercise the real SDKs.

backend: mock            # mock | emulator | live
connection_mode: direct  # direct | gateway
consistency: Session

# Used when backend != mock. Values can also be supplied per-run via the API.
emulator:
  # vNext Linux emulator (multi-arch; runs natively on Apple Silicon). It is
  # gateway-mode only and is started with `--protocol https` by the fault stack,
  # so the endpoint stays HTTPS. The SDK skips TLS verification for the emulator's
  # self-signed cert automatically (see harness make_backend / tls_verify).
  endpoint: "https://localhost:8081"
  # Well-known Cosmos DB emulator master key (public, non-secret):
  key: "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
  # Fault-injection proxy chain (only used by T-3xx scenarios; requires the
  # Docker stack: scripts/run-fault-stack.sh up). Non-fault scenarios ignore
  # these and talk to `endpoint` directly.
  proxy_endpoint: "https://localhost:18081"   # Toxiproxy 'cosmos' route (L4)
  mitm_endpoint: "https://localhost:18091"    # mitmproxy front of chain (L7+L4)
  toxiproxy_url: "http://localhost:8474"       # Toxiproxy admin API

live:
  endpoint: "${COSMOS_ENDPOINT}"   # supply via environment
  key: "${COSMOS_KEY}"             # supply via environment / secret store
  # Point these at wherever you run the proxy chain against your live account.
  proxy_endpoint: "${COSMOS_PROXY_ENDPOINT}"
  mitm_endpoint: "${MITM_ENDPOINT}"
  toxiproxy_url: "${TOXIPROXY_URL}"

sdks:
  python:
    versions:
      - label: "4.9.0"
        source: published      # from PyPI (pip)
      - label: "local-source"
        source: local          # built from an azure-sdk-for-python branch
        venv: "harness/python/.venv-local"
  java:
    versions:
      - label: "4.63.0"
        source: published      # from Maven Central
      - label: "local-source"
        source: local          # built from an azure-sdk-for-java branch
        jar: "harness/java/variants/local/cosmos-test-runner.jar"
