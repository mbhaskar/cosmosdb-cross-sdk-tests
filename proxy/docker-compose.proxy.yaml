# Toxiproxy + Cosmos DB emulator stack for transport-level fault injection.
#
# Brings up the Linux Cosmos DB emulator (vNext, multi-arch — runs natively on
# Apple Silicon) with a Toxiproxy instance in front of it. SDK runners point
# their endpoint at Toxiproxy (:18081); the orchestrator (or the harness
# ProxyFaultController) drives toxics via the admin API (:8474).
#
#   docker compose -f proxy/docker-compose.proxy.yaml up -d
#   python proxy/bootstrap.py            # register the 'cosmos' proxy route
#
# Then run fault-injection scenarios against the proxy endpoint, e.g.:
#   COSMOS_ENDPOINT=https://localhost:18081 COSMOS_KEY=<emulator-key> \
#   TOXIPROXY_URL=http://localhost:8474 \
#   python scripts/run-matrix.py --backend emulator --specs specs/phase06-fault-injection
#
# NOTE: requires Docker. Not runnable in the offline mock environment; this stack
# is intended for the CI fault-injection job (or a local Docker install).

services:
  cosmos-emulator:
    # vNext Linux emulator: multi-arch (amd64 + arm64), so it runs natively on
    # Apple Silicon Macs. Gateway mode only; HTTP by default, so we start it with
    # `--protocol https` to keep the whole proxy chain on TLS. The .NET/Java SDKs
    # require HTTPS against the emulator.
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest
    container_name: cosmos-emulator
    mem_limit: 3g
    cpu_count: 2
    command: ["--protocol", "https"]
    ports:
      - "8081:8081"     # gateway endpoint (HTTPS)
      - "8080:8080"     # health probe (/alive, /ready, /status) — always HTTP
      - "1234:1234"     # Data Explorer UI
    healthcheck:
      # The image ships bash (its entrypoint is /bin/bash). Prefer the readiness
      # probe on :8080; fall back to a raw TCP connect to the gateway.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ready >/dev/null 2>&1 || bash -c 'exec 3<>/dev/tcp/localhost/8081' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: toxiproxy
    depends_on:
      cosmos-emulator:
        condition: service_healthy
    ports:
      - "8474:8474"     # admin/control API
      - "18081:18081"   # 'cosmos' proxy listen (primary region)
      - "18082:18082"   # 'cosmos-secondary' proxy listen (multi-region tests)
    command: ["-host", "0.0.0.0", "-config", "/config/toxiproxy.json"]
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json:ro

  # Layer-7 protocol-fault proxy (mitmproxy). Sits IN FRONT of Toxiproxy so the
  # full chain is:  SDK -> mitmproxy(:18091) -> toxiproxy(:18081) -> emulator.
  # Toxiproxy is TCP-only and cannot emit an HTTP 429; this addon does. Point the
  # SDK at :18091 to get both tiers, or at :18081 for transport faults only.
  # Drive the throttle window via POST https://localhost:18091/__fault/throttle.
  mitmproxy:
    image: mitmproxy/mitmproxy:11.0.0
    container_name: mitmproxy
    depends_on:
      - toxiproxy
    ports:
      - "18091:18091"   # SDK-facing listen port (L7 + L4 chain)
    command:
      - mitmdump
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "18091"
      - --mode
      - reverse:https://toxiproxy:18081
      - --set
      - ssl_insecure=true
      - -s
      - /addons/throttle_window.py
    volumes:
      - ./mitm:/addons:ro
