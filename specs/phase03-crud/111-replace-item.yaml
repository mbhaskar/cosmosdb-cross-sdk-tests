id: "111"
phase: 3
section: "3.3"
title: "Replace item (full document update)"
description: |
  Replacing an existing item persists the new content.
tags: [crud, replace]
backends: [mock, emulator, live]

fixture:
  database: "auto"
  container:
    id: "orders"
    partition_key: "/customerId"

steps:
  - id: seed
    action: create_item
    params:
      item:
        id: "order-1"
        customerId: "cust-1"
        total: 42
        status: "pending"
    expect:
      - { type: ok }

  - id: replace
    action: replace_item
    params:
      id: "order-1"
      partition_key: "cust-1"
      item:
        id: "order-1"
        customerId: "cust-1"
        total: 99
        status: "shipped"
    expect:
      - { type: ok }
      - { type: field_equals, path: item.total, value: 99 }

  - id: verify
    action: read_item
    params:
      id: "order-1"
      partition_key: "cust-1"
    expect:
      - { type: field_equals, name: status_updated, path: item.status, value: "shipped" }
