id: "127"
phase: 3
section: "3.6"
title: "Delete item by ID + partition key"
description: |
  Deleting an item removes it; a subsequent read returns 404.
tags: [crud, delete]
backends: [mock, emulator, live]

fixture:
  database: "auto"
  container:
    id: "orders"
    partition_key: "/customerId"

steps:
  - id: seed
    action: create_item
    params:
      item:
        id: "order-1"
        customerId: "cust-1"
        total: 42
    expect:
      - { type: ok }

  - id: delete
    action: delete_item
    params:
      id: "order-1"
      partition_key: "cust-1"
    expect:
      - { type: ok }
      - { type: status_code, value: 204 }

  - id: read_after_delete
    action: read_item
    params:
      id: "order-1"
      partition_key: "cust-1"
    expect:
      - { type: error_status, name: gone_after_delete, value: 404 }
