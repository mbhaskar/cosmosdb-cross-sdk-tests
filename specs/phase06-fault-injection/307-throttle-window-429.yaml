id: "T-307"
phase: 6
section: "6.7"
title: "Sustained 429 window: SDK backs off honoring retry-after, then recovers"
description: |
  A time-windowed 429 (TooManyRequests) storm is injected at the HTTP layer by
  the mitmproxy addon (proxy/mitm/throttle_window.py) -- Toxiproxy is TCP-only
  and cannot synthesize a status code, so this is the Layer-7 counterpart to the
  transport-fault scenarios (T-301..T-306).

  While the window is armed every request is answered with 429 +
  x-ms-retry-after-ms. A resilient SDK must back off per the retry-after hint and
  keep retrying rather than surfacing the throttle to the caller. The window is
  short (3s) with a 500ms retry hint so a single operation's retry budget spans
  it: the read is throttled, backs off, and eventually succeeds once the window
  clears -- exercising the real 429 retry policy end to end.

  This complements the offline mock throttle scenario (C-230): C-230 proves the
  SDK reacts to the protocol contract deterministically offline; T-307 proves it
  survives a real, wall-clock 429 storm on the wire against emulator/live.

  Layer-7 protocol fault: requires the emulator + mitmproxy stack
  (proxy/docker-compose.proxy.yaml, SDK endpoint -> :18091). Not runnable on the
  offline mock tier.
tags: [fault-injection, protocol, throttle, 429, retry, mitmproxy]
backends: [emulator, live]
runners: [python]

fault_injection:
  proxy: cosmos
  protocol: mitmproxy

fixture:
  database: "auto"
  container:
    id: "orders"
    partition_key: "/customerId"

timeline:
  - after: seed
    event: net_throttle_window
    args: { seconds: 3, retry_after_ms: 500 }
  - after: read_through_throttle
    event: throttle_window_clear

steps:
  - id: seed
    action: create_item
    params: { item: { id: "o1", customerId: "cust-1", status: "active" } }
    expect: [ { type: ok } ]

  - id: read_through_throttle
    action: read_item
    params: { id: "o1", partition_key: "cust-1" }
    expect:
      # The SDK rode out the 429 window by backing off and retrying.
      - { type: retry_count_gte, name: backed_off, value: 1 }
      - { type: eventually_ok, name: recovers_after_window }
      - { type: field_equals, name: right_item, path: item.id, value: "o1" }

  - id: read_after_clear
    action: read_item
    params: { id: "o1", partition_key: "cust-1" }
    expect:
      - { type: ok, name: steady_state_ok }
