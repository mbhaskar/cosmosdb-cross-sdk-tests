id: "T-305"
phase: 6
section: "6.5"
title: "Primary region outage triggers failover to a secondary region"
description: |
  With a multi-region (secondary) proxy route available, a region_down toxic
  black-holes the primary upstream. A multi-region-aware SDK should detect the
  primary is unavailable and fail over to the secondary region, serving reads
  from there. Once the primary is restored, traffic can return.

  Transport-level fault: requires the emulator + Toxiproxy stack with the
  secondary proxy route (proxy/toxiproxy.json). Not runnable in the offline
  mock tier, and requires an SDK client configured with preferred regions.
tags: [fault-injection, transport, region-down, failover, multi-region, toxiproxy]
backends: [emulator, live]
runners: [python]

fault_injection:
  proxy: cosmos
  multi_region: true

fixture:
  database: "auto"
  container:
    id: "orders"
    partition_key: "/customerId"

timeline:
  - after: seed
    event: region_down
    args: { region: primary }
  - after: read_during_failover
    event: region_up
    args: { region: primary }

steps:
  - id: seed
    action: create_item
    params: { item: { id: "o1", customerId: "cust-1", status: "active" } }
    expect: [ { type: ok } ]

  - id: read_during_failover
    action: read_item
    params: { id: "o1", partition_key: "cust-1" }
    expect:
      - { type: eventually_ok, name: served_from_secondary }
      # The SDK should report it contacted a non-primary region.
      - { type: failover_region, name: contacted_secondary, equals: "secondary" }

  - id: read_after_restore
    action: read_item
    params: { id: "o1", partition_key: "cust-1" }
    expect:
      - { type: eventually_ok, name: recovers_after_restore }
